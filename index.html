<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PlumMine - Tap to Earn</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <script async src="https://ss.mrmnd.com/interstitial.js" data-mndintid="ace4b2a0-0bfe-493d-b8e2-c39de7fe1ce2"></script>
    
    <style>
        :root { --primary: #2e7d32; --bg: #f1f8e9; --text: #333; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); margin: 0; padding: 0; user-select: none; color: var(--text); overflow-x: hidden; }
        .page { display: none; padding: 20px; padding-bottom: 90px; min-height: 100vh; box-sizing: border-box; text-align: center; }
        .active { display: block; }

        /* হেডার ডিজাইন */
        .header { display: flex; justify-content: space-between; align-items: center; background: white; padding: 10px 15px; border-radius: 0 0 15px 15px; box-shadow: 0 3px 6px rgba(0,0,0,0.1); }
        .header .logo { display: flex; align-items: center; font-weight: bold; color: var(--primary); font-size: 20px; }
        .header .user { display: flex; align-items: center; }
        .user-pic { width: 35px; height: 35px; border-radius: 50%; border: 2px solid var(--primary); margin-left: 10px; }

        /* ব্যালেন্স কার্ড ডিজাইন */
        .balance-card { background: white; margin: 15px auto; width: 90%; padding: 20px; border-radius: 20px; text-align: center; border: 2px solid #8d6e63; box-shadow: 0 4px 8px rgba(0,0,0,0.1); position: relative; }
        .balance-card small { color: #8d6e63; font-weight: bold; display: block; margin-bottom: 5px; }
        .balance-card h1 { font-size: 42px; margin: 0; color: #d84315; }
        .progress-box { width: 85%; background: #eee; height: 10px; border-radius: 5px; margin: 12px auto; overflow: hidden; border: 1px solid #ccc; }
        #fill { width: 0%; height: 100%; background: #1976d2; transition: width 0.2s; }

        /* গেম এরিয়া: বরই গাছ এবং টব */
        .game-zone { position: relative; height: 380px; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; margin-top: 10px; }
        
        /* আপনার দেওয়া নতুন গাছ */
        #plum-tree { width: 250px; z-index: 2; cursor: pointer; transition: transform 0.1s ease; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.2)); }
        #plum-tree:active { transform: scale(0.92); }
        .pot { width: 140px; margin-top: -20px; z-index: 1; }
        
        /* এনিমেশন: বরই ঝরে পড়া */
        .plum-fall { position: absolute; font-size: 24px; animation: fallAnim 0.7s forwards; pointer-events: none; z-index: 10; }
        @keyframes fallAnim { 0% { transform: translateY(0); opacity:1; } 100% { transform: translateY(220px); opacity:0; } }

        /* কার্ড ডিজাইন */
        .card { background: white; padding: 15px; margin: 10px 0; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-left: 5px solid var(--primary); text-align: left; }
        .btn { background: var(--primary); color: white; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .tg-icon { width: 22px; margin-right: 8px; vertical-align: middle; }

        /* নেভিগেশন বার */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #ddd; z-index: 1000; }
        .nav-link { text-align: center; font-size: 11px; color: #757575; cursor: pointer; flex: 1; text-decoration: none; }
        .nav-link.active-nav { color: var(--primary); font-weight: bold; }
        .nav-link.active-nav i { color: var(--primary); }
    </style>
</head>
<body>

    <div id="home" class="page active">
        <div class="header">
            <div class="logo">🍒 PlumMine</div>
            <div class="user">
                <span id="u-name">Player</span>
                <img id="u-img" class="user-pic" src="https://via.placeholder.com/35" alt="U">
            </div>
        </div>
        
        <div class="balance-card">
            <small>YOUR BOIROI BALANCE</small>
            <h1 id="bal">0</h1>
            <div class="progress-box"><div id="fill"></div></div>
            <small style="color:#555">Next ad in [Tap: <span id="tc">0</span>/50]</small>
        </div>
        
        <div class="game-zone" onclick="doTap()">
            <img id="plum-tree" src="https://i.ibb.co.com/TBfn8G8M/27099-removebg-preview.png" alt="Tree">
            <img class="pot" src="https://cdn-icons-png.flaticon.com/512/628/628283.png" alt="Pot">
            <div id="p-area"></div>
        </div>
    </div>

    <div id="tasks" class="page">
        <h2 style="color:var(--primary)">📋 টাস্ক লিস্ট (Reward: 10 🍒)</h2>
        <div id="task-list"></div>
    </div>

    <div id="withdraw" class="page">
        <h2 style="color:var(--primary)">💰 উইথড্র</h2>
        <div class="balance-card">
            <p>মিনিমাম: 5000 🍒 ($0.01)</p>
            <h2 id="w-bal" style="color:var(--primary)">0</h2>
        </div>
        <input id="wallet" type="text" placeholder="BSC Wallet Address (0x...)" style="width:95%; padding:15px; border-radius:10px; border:1px solid #ddd; margin-top:10px; box-sizing:border-box;">
        <button class="btn" style="width:95%; margin-top:15px; padding:15px" onclick="checkW()">Withdraw Now</button>
    </div>

    <div id="refer" class="page">
        <h2 style="color:var(--primary)">👥 রেফারেল</h2>
        <div class="balance-card">
            <p id="ref-link" style="font-size:12px; color:blue; word-break:break-all;">Generating link...</p>
            <button class="btn" onclick="copyRef()">Copy Link</button>
        </div>
    </div>

    <div id="support" class="page">
        <h2 style="color:var(--primary)">🎧 সাপোর্ট</h2>
        <div class="card" onclick="window.open('https://t.me/SumaiyaJannatHasi','_blank')">
            <span><img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png" class="tg-icon"> Admin</span>
            <button class="btn">Chat</button>
        </div>
        <div class="card" onclick="window.open('https://t.me/HasiEarnigZone','_blank')">
            <span><img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png" class="tg-icon"> Channel</span>
            <button class="btn">Join</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-link active-nav" onclick="nav('home', this)">🍒<br>PlumMine</div>
        <div class="nav-link" onclick="nav('tasks', this)">📋<br>Tasks</div>
        <div class="nav-link" onclick="nav('withdraw', this)">💰<br>Withdraw</div>
        <div class="nav-link" onclick="nav('refer', this)">👥<br>Refer</div>
        <div class="nav-link" onclick="nav('support', this)">🎧<br>Support</div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let points = parseInt(localStorage.getItem('p_bal')) || 0;
        let taps = 0;

        // আপনার দেওয়া ৫টি ডাইরেক্ট লিঙ্ক
        const links = [
            "https://www.effectivegatecpm.com/terguwpb?key=f9a940d361f256fea01e722ed90142a0",
            "https://www.effectivegatecpm.com/h0pcefng?key=abbdbc66cbbe1b5399de46182281695e",
            "https://www.effectivegatecpm.com/vvqrzy9mi?key=b86387c522a84da67f7603d92e41b9e3",
            "https://www.effectivegatecpm.com/xvtvgpzu?key=d840ab456701c101a4df8de6f240f8d6",
            "https://www.effectivegatecpm.com/vvqrzy9mi?key=b86387c522a84da67f7603d92e41b9e3"
        ];

        function update() {
            document.getElementById('bal').innerText = points.toLocaleString();
            document.getElementById('w-bal').innerText = points.toLocaleString();
            document.getElementById('tc').innerText = taps;
            document.getElementById('fill').style.width = (taps / 50) * 100 + "%";
            localStorage.setItem('p_bal', points);
        }

        function nav(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active-nav'));
            el.classList.add('active-nav');
        }

        function doTap() {
            if (taps < 50) {
                points++; taps++; update();
                // বরই পড়ার এনিমেশন
                const p = document.createElement('div');
                p.className = 'plum-fall'; p.innerText = "🍒";
                p.style.left = Math.random() * 60 + 20 + "%";
                document.getElementById('p-area').appendChild(p);
                setTimeout(() => p.remove(), 700);
            } else {
                // ৫০ ট্যাপ পর Mondiad ইন্টারস্টিশিয়াল অ্যাড দেখাবে
                if (typeof mndint !== 'undefined') { mndint.show(); }
                taps = 0; update();
            }
        }

        // --- টাস্ক সিস্টেম (২৪ ঘণ্টা লক) ---
        const taskDiv = document.getElementById('task-list');
        function renderTasks() {
            taskDiv.innerHTML = '';
            const now = new Date().getTime();
            for(let i=1; i<=10; i++){
                const lastClaim = localStorage.getItem(`task_${i}_time`);
                const isCompleted = lastClaim && (now - lastClaim < 24 * 60 * 60 * 1000);
                taskDiv.innerHTML += `
                    <div class="card">
                        <span>Task ${i}: watch Ad</span>
                        <button class="btn" id="btn_${i}" 
                            ${isCompleted ? 'disabled style="background:#ccc"' : ''} 
                            onclick="goTask(${i})">
                            ${isCompleted ? 'Completed' : 'Claim'}
                        </button>
                    </div>`;
            }
        }

        function goTask(id) {
            if(id <= 5) window.open(links[id-1], '_blank');
            else if (typeof mndint !== 'undefined') { mndint.show(); }
            points += 10;
            localStorage.setItem(`task_${id}_time`, new Date().getTime());
            update(); renderTasks();
            tg.showAlert("টাস্ক সফল! ১০টি বড়ই যুক্ত হয়েছে। ২৪ ঘণ্টা পর আবার আসবে।");
        }

        function checkW() {
            if(points < 5000) tg.showAlert("মিনিমাম ৫০০০ বড়ই লাগবে।");
            else tg.showAlert("রিকোয়েস্ট সফল! অ্যাডমিন ২৪ ঘণ্টার মধ্যে চেক করবেন।");
        }

        function copyRef() {
            navigator.clipboard.writeText(document.getElementById('ref-link').innerText);
            tg.showAlert("লিঙ্ক কপি হয়েছে!");
        }

        // ব্যবহারকারী তথ্য সেট করা
        if (tg.initDataUnsafe.user) {
            const u = tg.initDataUnsafe.user;
            document.getElementById('u-name').innerText = u.first_name;
            if(u.photo_url) document.getElementById('u-img').src = u.photo_url;
            document.getElementById('ref-link').innerText = `https://t.me/PlumMineTap_bot?start=${u.id}`;
        }

        update(); renderTasks();
    </script>
</body>
</html>
